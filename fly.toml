# Fly.io deployment config for Gallery.
#
# This file makes `fly launch --copy-config --name stoa-gallery` a
# one-command deploy. The only thing Kevin needs to do in the morning:
#
#   $ cd gallery
#   $ fly launch --copy-config --name stoa-gallery
#   $ fly volumes create gallery_data --size 3 --region iad
#   $ fly deploy
#
# A persistent 3 GB volume at /data holds uploaded .ordo-run archives
# (archive blobs + events.ndjson per run). The in-memory live-stream
# broker is ephemeral per machine — fine for the first deploy; a
# multi-machine replica would swap it for Upstash Redis or Fly Redis.

app = "stoa-gallery"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  GALLERY_DATA_DIR = "/data"
  GALLERY_PUBLIC_URL = "https://stoa-gallery.fly.dev"
  NODE_ENV = "production"

[[mounts]]
  source = "gallery_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "3s"
    path = "/api/stoa/describe"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
